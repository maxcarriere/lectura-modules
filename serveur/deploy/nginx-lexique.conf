# Rate limiting zones
limit_req_zone $binary_remote_addr zone=lexique_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=lexique_search:10m rate=5r/s;

# Cache
proxy_cache_path /var/cache/nginx/lexique levels=1:2 keys_zone=lexique_cache:10m
                 max_size=1g inactive=24h use_temp_path=off;

# HTTP → HTTPS
server {
    listen 80;
    server_name lexique.lec-tu-ra.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lexique.lec-tu-ra.com;

    ssl_certificate /etc/letsencrypt/live/lexique.lec-tu-ra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lexique.lec-tu-ra.com/privkey.pem;

    # Body limit — pas d'upload
    client_max_body_size 1k;

    # Timeouts
    proxy_read_timeout 15s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;

    # Headers de securite
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://commons.wikimedia.org https://upload.wikimedia.org; font-src 'self'; connect-src 'self'; frame-ancestors 'none'" always;

    # Fichiers statiques — cache long
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_cache lexique_cache;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Sitemaps — cache 24h
    location ~ ^/sitemap {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache lexique_cache;
        proxy_cache_valid 200 24h;
        limit_req zone=lexique_general burst=5 nodelay;
    }

    # Recherche — rate limit strict
    location /rechercher {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache lexique_cache;
        proxy_cache_valid 200 1h;
        limit_req zone=lexique_search burst=10 nodelay;
    }

    # robots.txt — cache long
    location = /robots.txt {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_cache lexique_cache;
        proxy_cache_valid 200 24h;
    }

    # Pages web — cache 1h, rate limit general
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache lexique_cache;
        proxy_cache_valid 200 1h;
        limit_req zone=lexique_general burst=20 nodelay;
    }
}
