[project]
name = "lectura-morpho-bilstm"
version = "1.0.0"
description = "Analyseur morphologique BiLSTM pour le français (ONNX Runtime)"
readme = "README.md"
license = {text = "CC-BY-SA-4.0"}
requires-python = ">=3.10"
dependencies = ["onnxruntime", "numpy"]

[project.urls]
Homepage = "https://music-music.music"

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"
