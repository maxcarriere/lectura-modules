[project]
name = "lectura-g2p-bilstm"
version = "1.0.0"
description = "Convertisseur graphème-phonème BiLSTM pour le français"
readme = "README.md"
license = {text = "CC-BY-SA-4.0"}
requires-python = ">=3.10"
