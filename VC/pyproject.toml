[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lectura-vc"
version = "2.1.0"
description = "Module de conversion vocale Lectura — meta-package unifie (RVC + OpenVoice)"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "Lectura" }]

dependencies = [
    "lectura-vc-zeroshot>=1.1",
    "lectura-vc-locuteurs>=1.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools.packages.find]
where = ["src"]
