[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "lectura-tts-monospeaker"
version = "3.0.0"
description = "DEPRECIE — Utiliser lectura-monospeaker a la place. Ce package redirige automatiquement."
requires-python = ">=3.10"
license = {text = "AGPL-3.0-or-later"}
authors = [{name = "Max Carriere", email = "admin@lectura.world"}]
classifiers = ["Development Status :: 7 - Inactive"]
dependencies = ["lectura-monospeaker>=3.0"]

[tool.setuptools.packages.find]
where = ["src"]
